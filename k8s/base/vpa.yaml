apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: controller-vpa
  namespace: loadtest
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: controller
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          cpu: 200m
          memory: 512Mi
        maxAllowed:
          cpu: 4000m
          memory: 4Gi
        controlledResources: ["cpu", "memory"]
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: admission-vpa
  namespace: loadtest
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: admission-gateway
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          cpu: 100m
          memory: 128Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: worker-vpa
  namespace: loadtest
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: worker
  # For worker, we might already have HPA. Using VPA in Auto mode with HPA on CPU/Memory is not recommended.
  # We use VPA in Initial or Off mode to get recommendations without interfering with HPA.
  updatePolicy:
    updateMode: "Off"
