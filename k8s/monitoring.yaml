# ========== Prometheus ServiceMonitors for Managed Prometheus (AMP) ==========
# We use ServiceMonitors to tell the Prometheus Operator (or ADOT) to scrape these endpoints
# and forward the metrics to Amazon Managed Prometheus.

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: controller-monitor
  namespace: loadtest
  labels:
    release: prometheus # Must match the Prometheus operator's selector
spec:
  selector:
    matchLabels:
      app: controller
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 15s
    scrapeTimeout: 10s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: admission-gateway-monitor
  namespace: loadtest
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: admission
  endpoints:
  - port: metrics # The 9091 port we exposed in the Go admission gateway
    path: /metrics
    interval: 15s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: worker-monitor
  namespace: loadtest
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: worker
  endpoints:
  - port: metrics # Assuming the Rust worker exposes metrics on a port named 'metrics'
    path: /metrics
    interval: 10s # Scrape workers more frequently for real-time load test telemetry